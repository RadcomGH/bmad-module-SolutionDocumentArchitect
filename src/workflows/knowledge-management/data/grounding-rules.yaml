                "network", "SRIOV", "DPDK", "performance", "throughput", "latency", "bandwidth",
                "VoLTE", "VoNR", "RTP", "SIP", "Diameter", "GTP", "NGAP", "5G", "IMS",
                "MOS", "R-Factor", "jitter", "packet loss", "voice quality",
                "ML", "machine learning", "anomaly detection", "AIM", "Prophet", "ARIMA", "forecasting",
